<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Генератор Вопросов</title>
    <style>
        :root {
            --primary: #4a90e2;
            --bg: #f5f7fa;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 700px; }
        h1 { color: #333; text-align: center; font-size: 24px; }
        textarea { width: 100%; height: 150px; padding: 15px; border: 2px solid #ddd; border-radius: 10px; resize: none; box-sizing: border-box; font-size: 16px; transition: 0.3s; }
        textarea:focus { border-color: var(--primary); outline: none; }
        button { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; font-size: 18px; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        button:hover { background: #357abd; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #result { margin-top: 25px; white-space: pre-wrap; line-height: 1.6; color: #444; background: #f9f9f9; padding: 15px; border-radius: 10px; display: none; border-left: 5px solid var(--primary); }
        .loader { text-align: center; display: none; margin-top: 15px; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h1>🤖 AI Генератор вопросов</h1>
    <p>Вставь текст, и нейросеть создаст вопросы для проверки знаний.</p>
    
    <textarea id="inputText" placeholder="Например: История создания Казахского ханства..."></textarea>
    
    <button id="genBtn" onclick="askAI()">Сгенерировать вопросы</button>
    
    <div class="loader" id="loader">⚡ Нейросеть думает...</div>
    <div id="result"></div>
</div>

<script>
    async function askAI() {
        const text = document.getElementById('inputText').value;
        const btn = document.getElementById('genBtn');
        const resultDiv = document.getElementById('result');
        const loader = document.getElementById('loader');

        if (!text.trim()) {
            alert("Введи текст!");
            return;
        }

        btn.disabled = true;
        loader.style.display = "block";
        resultDiv.style.display = "none";

        // Попытка №1: Прямой и быстрый сервис
        try {
            const response = await fetch("https://text.pollinations.ai/", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    messages: [{ role: "user", content: `Прочитай текст и напиши только 5 вопросов к нему на русском языке: ${text}` }],
                    model: "openai" // Используем стабильную модель
                })
            });

            if (!response.ok) throw new Error("Первый сервис занят");

            const aiText = await response.text();
            resultDiv.innerText = aiText.trim();
            resultDiv.style.display = "block";

        } catch (error) {
            console.log("Пробую запасной вариант...");
            
            // Попытка №2: Запасной вариант через другой шлюз
            try {
                const altResponse = await fetch("https://text.pollinations.ai/Составь 5 вопросов по тексту на русском: " + encodeURIComponent(text));
                const altText = await altResponse.text();
                
                if (altText) {
                    resultDiv.innerText = altText.trim();
                    resultDiv.style.display = "block";
                } else {
                    resultDiv.innerText = "ИИ взял паузу. Подожди 10 секунд и нажми кнопку еще раз.";
                    resultDiv.style.display = "block";
                }
            } catch (altError) {
                resultDiv.innerText = "Сервер временно перегружен. Попробуй еще раз через мгновение!";
                resultDiv.style.display = "block";
            }
        } finally {
            btn.disabled = false;
            loader.style.display = "none";
        }
    }
</script>

</body>
</html>
